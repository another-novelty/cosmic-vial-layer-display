name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build applet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            libclang-dev \
            pkg-config

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            applet/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('applet/Cargo.lock', 'applet/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Sync Cargo.toml version with tag
        working-directory: applet
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          HIGHER=$(printf '%s\n' "$TAG_VERSION" "$CARGO_VERSION" | sort -rV | head -1)
          echo "Tag version: $TAG_VERSION, Cargo.toml version: $CARGO_VERSION, using: $HIGHER"
          if [ "$CARGO_VERSION" != "$HIGHER" ]; then
            sed -i "s/^version = \"$CARGO_VERSION\"/version = \"$HIGHER\"/" Cargo.toml
            echo "Updated Cargo.toml version to $HIGHER"
          fi

      - name: Build release binary
        working-directory: applet
        run: cargo build --release

      - name: Rename binary with version tag
        run: |
          cp applet/target/release/vial-layer vial-layer-${{ github.ref_name }}-linux-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vial-layer-${{ github.ref_name }}-linux-x86_64
          generate_release_notes: true
